<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Studio</title>
    <link rel="stylesheet" href="./bamboo-1.3.7.min.css" />
    <link rel="stylesheet" href="./bamboo-overrides.css" />
  </head>

  <body>
    <main>
      <h1>URL Studio</h1>

      <label for="user-url"
        >URL (or try <a id="user-url-example-link" href="#">example</a>)</label
      >
      <input
        id="user-url"
        type="url"
        placeholder="https://example.com/path?key=value"
      />
      <p id="user-url-error" class="error" hidden></p>

      <label for="bookmark-title"
        >Bookmark Title (to
        <a
          id="bookmark-title-edit-link"
          target="_blank"
          rel="noreferrer noopener"
          >edit</a
        >
        later)</label
      >
      <input
        id="bookmark-title"
        type="text"
        placeholder="Replacing some stuff"
      />

      <section class="split" aria-label="Original and editable URL panes">
        <article class="panel readonly">
          <h2>URL Data</h2>

          <ul>
            <li>Origin = <output id="original-origin">-</output></li>
            <li>Path = <output id="original-path">-</output></li>
          </ul>

          <h3>Query Parameters</h3>
          <ul id="original-query-list"></ul>
        </article>

        <article class="panel">
          <h2>Update URL</h2>

          <output
            id="generated-url"
            class="generated-url-output"
            aria-live="polite"
          ></output>
          <p class="bookmark-link-line">
            Or click:
            <a
              id="generated-bookmark-link"
              href="#"
              target="_blank"
              rel="noreferrer noopener"
            ></a>
          </p>

          <div class="section-separator" aria-hidden="true"></div>

          <div class="field-inline">
            <label for="editable-origin">Origin</label>
            <input
              id="editable-origin"
              type="url"
              placeholder="https://example.com"
            />
          </div>

          <div class="field-inline">
            <label for="editable-path">Path</label>
            <input id="editable-path" type="text" placeholder="/path" />
          </div>

          <h3>Query Parameters</h3>
          <div id="editable-rows"></div>
          <button id="add-row" type="button">+ Add Parameter</button>
        </article>
      </section>
    </main>

    <script type="module" src="./index.js"></script>
  </body>
</html>
